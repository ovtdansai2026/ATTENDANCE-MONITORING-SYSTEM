<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนกิจกรรม</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Prompt', sans-serif; background: #0f172a; }</style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen text-slate-800">

    <div class="w-full max-w-md bg-white p-6 rounded-3xl shadow-xl mt-4">
        <div class="text-center mb-6">
            <h1 id="activityTitle" class="text-xl font-bold text-blue-600">กำลังโหลดข้อมูล...</h1>
            <p id="deadlineText" class="text-xs text-slate-500 mt-2"></p>
        </div>

        <div id="loadingStatus" class="bg-blue-50 text-blue-600 text-xs text-center p-2 rounded-lg mb-4 animate-pulse">
            ⏳ กำลังดึงฐานข้อมูลและตรวจสอบสิทธิ์...
        </div>

        <form id="attendanceForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold mb-1 text-slate-600">1. เลือกห้องเรียน/แผนก</label>
                <select id="roomSelect" required disabled class="w-full border border-slate-300 rounded-lg p-3 text-sm bg-slate-50 outline-none focus:border-blue-500 focus:bg-white transition-colors disabled:opacity-50">
                    <option value="">กำลังโหลดข้อมูล...</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold mb-1 text-slate-600">2. เลือกชื่อของตนเอง</label>
                <select id="studentSelect" required disabled class="w-full border border-slate-300 rounded-lg p-3 text-sm bg-slate-50 outline-none focus:border-blue-500 focus:bg-white transition-colors disabled:opacity-50">
                    <option value="">-- กรุณาเลือกห้องเรียนก่อน --</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold mb-2 text-slate-600">3. ถ่ายรูปหน้าตนเองในงาน</label>
                <input type="file" id="imageInput" accept="image/*" capture="user" required class="w-full text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
            </div>

            <button type="submit" id="submitBtn" disabled class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 shadow-md transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                ส่งข้อมูลเช็คชื่อ
            </button>
        </form>
    </div>

    <script>
        // 🌟 ลิงก์ API ตัวล่าสุด 
        const API_URL = "https://script.google.com/macros/s/AKfycbzEZwclY5DDyAEW5LFToH3WkK3slgHeHVTS1pTizIhvI7iEZwGUtD9GKcv-EPlWu1rE7Q/exec";
        
        const params = new URLSearchParams(window.location.search);
        const activity = params.get('activity');
        const deadline = params.get('deadline');
        const urlDept = params.get('dept') ? params.get('dept').split(',') : null;
        const urlLevel = params.get('level') ? params.get('level').split(',') : null;

        document.getElementById('activityTitle').innerText = activity || "ไม่พบชื่อกิจกรรม";
        
        let subText = "";
        if (deadline && deadline !== "none") subText += "ปิดรับเช็คชื่อ: " + new Date(deadline).toLocaleString('th-TH');
        
        // 🌟 โชว์ให้เด็กรู้ว่าล็อกแผนกไหนบ้าง
        let targetText = [];
        if(urlDept) targetText.push("แผนก: " + urlDept.join(', '));
        if(urlLevel) targetText.push("ชั้นปี: " + urlLevel.join(', '));
        if(targetText.length > 0) subText += `<br><span class="text-amber-600 font-bold mt-1 inline-block">🎯 สิทธิ์เฉพาะ: ${targetText.join(' | ')}</span>`;
        document.getElementById('deadlineText').innerHTML = subText;

        let allStudents = [];
        let filteredStudents = []; 

        window.onload = async () => {
            try {
                const res = await fetch(API_URL + "?type=activity");
                const json = await res.json();
                
                if(json.status === "success") {
                    
                    // 🌟 เพิ่มท่อนนี้: ช่วยแยกชื่อ "ช่างยนต์ ปวช.1" ให้กลายเป็น แผนก="ช่างยนต์", ชั้นปี="ปวช.1"
                    allStudents = json.data.map(s => {
                        let d = s.department || "";
                        let l = s.pureLevel || "";
                        if (l && d.includes(l)) d = d.replace(l, "").trim(); 
                        return { ...s, department: d, pureLevel: l };
                    });

                    filteredStudents = allStudents;

                    // 🎯 ร่อนตะแกรงกรองแผนกและชั้นปี
                    if(urlDept) filteredStudents = filteredStudents.filter(s => urlDept.includes(s.department));
                    if(urlLevel) filteredStudents = filteredStudents.filter(s => urlLevel.includes(s.pureLevel));

                    const roomSelect = document.getElementById('roomSelect');
                    if (filteredStudents.length === 0) {
                        roomSelect.innerHTML = '<option value="">⛔ กิจกรรมนี้ไม่ได้เปิดให้แผนกของคุณ</option>';
                        document.getElementById('loadingStatus').innerText = "คุณไม่มีสิทธิ์ลงทะเบียนกิจกรรมนี้";
                        document.getElementById('loadingStatus').classList.replace('bg-blue-50', 'bg-red-50');
                        document.getElementById('loadingStatus').classList.replace('text-blue-600', 'text-red-600');
                        return;
                    }

                    // สร้างห้องเรียนจากข้อมูลที่ร่อนแล้ว
                    const rooms = [...new Set(filteredStudents.map(s => `${s.department} ${s.pureLevel}`.trim()))].sort();
                    
                    roomSelect.innerHTML = '<option value="">-- แตะเพื่อเลือกห้องเรียน --</option>';
                    rooms.forEach(r => roomSelect.add(new Option(r, r)));
                    
                    roomSelect.disabled = false;
                    document.getElementById('loadingStatus').classList.add('hidden');
                    document.getElementById('submitBtn').disabled = false;
                }
            } catch(e) {
                document.getElementById('loadingStatus').innerText = "❌ โหลดข้อมูลล้มเหลว กรุณารีเฟรชหน้าเว็บ";
                document.getElementById('loadingStatus').classList.replace('bg-blue-50', 'bg-red-50');
                document.getElementById('loadingStatus').classList.replace('text-blue-600', 'text-red-600');
            }
        };

        // เมื่อจิ้มห้อง ให้กรองชื่อคนในห้องนั้นมาให้เลือก
        document.getElementById('roomSelect').addEventListener('change', function() {
            const selectedRoom = this.value;
            const studentSelect = document.getElementById('studentSelect');
            studentSelect.innerHTML = '<option value="">-- แตะเพื่อเลือกชื่อของตนเอง --</option>';
            if(!selectedRoom) { studentSelect.disabled = true; return; }

            const studentsInRoom = filteredStudents.filter(s => `${s.department} ${s.pureLevel}`.trim() === selectedRoom)
                                                   .sort((a,b) => a.studentName.localeCompare(b.studentName));
            studentsInRoom.forEach(s => studentSelect.add(new Option(s.studentName, s.studentName)));
            studentSelect.disabled = false;
        });

        // ส่งข้อมูลให้ API
        document.getElementById('attendanceForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const selectedRoom = document.getElementById('roomSelect').value;
            const selectedName = document.getElementById('studentSelect').value;

            // ดึงข้อมูลชั้นปีและแผนกที่แท้จริงจาก Object เด็กคนนั้น
            const studentObj = filteredStudents.find(s => s.studentName === selectedName && `${s.department} ${s.pureLevel}`.trim() === selectedRoom);

            // ฟังก์ชันส่วนตัวสำหรับรีเซ็ตปุ่มเมื่อทำงานผิดพลาด
            const resetBtn = () => {
                btn.disabled = false; 
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btn.innerText = "ส่งข้อมูลเช็คชื่อ";
            };

            btn.disabled = true; 
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            btn.innerText = "กำลังอัปโหลดข้อมูลและรูปภาพ...";

            const file = document.getElementById('imageInput').files[0];
            if (!file) {
                alert("❌ กรุณาเลือกหรือถ่ายภาพหลักฐานการเข้าร่วมกิจกรรม");
                resetBtn();
                return;
            }

            const reader = new FileReader();
            
            // 🌟 ป้องกันค้าง: หากเปิดอ่านไฟล์รูปภาพของเครื่องเด็กไม่สำเร็จ
            reader.onerror = function() {
                alert("❌ ไม่สามารถเปิดไฟล์รูปภาพหลักฐานได้ กรุณาลองถ่ายรูปใหม่อีกครั้ง");
                resetBtn();
            };

            reader.readAsDataURL(file);
            reader.onload = function(event) {
                // สร้าง Image Object เพื่อเตรียมย่อขนาด
                const img = new Image();
                img.src = event.target.result;
                
                // 🌟 ป้องกันค้าง: หากตัวเว็บโหลดข้อมูลไฟล์ภาพเพื่อย่อขนาดไม่สำเร็จ
                img.onerror = function() {
                    alert("❌ รูปภาพหลักฐานมีปัญหา ข้อมูลขัดข้อง กรุณาลองถ่ายรูปใหม่อีกครั้ง");
                    resetBtn();
                };

                img.onload = async function() {
                    // สร้าง Canvas สำหรับบีบอัด
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800; // กำหนดความกว้างสูงสุด 800 px (ชัดพอสำหรับดูหน้า)
                    const scaleSize = MAX_WIDTH / img.width;
                    
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;

                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                    // บีบอัดรูปเป็น JPEG คุณภาพ 60% (ลดขนาดจาก 2MB เหลือประมาณ 100KB)
                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6);

                    // เตรียมข้อมูลส่งไปที่ API
                    const payload = {
                        studentName: selectedName,
                        pureLevel: studentObj.pureLevel, 
                        pureDept: studentObj.department, 
                        activityName: activity,
                        deadline: deadline,
                        imageCode: compressedBase64 // ส่งรูปที่ย่อไซส์แล้วไปแทน
                    };
                    
                    try {
                        const res = await fetch(API_URL, {
                            method: "POST",
                            headers: { "Content-Type": "text/plain;charset=utf-8" },
                            body: JSON.stringify(payload)
                        });
                        const result = await res.json();
                        
                        if (result.status === "success") {
                            alert("✅ บันทึกข้อมูลและอัปโหลดหลักฐานเรียบร้อยแล้ว!");
                            location.reload(); 
                        } else {
                            alert("❌ เกิดข้อผิดพลาดจากระบบ: " + result.message);
                            resetBtn();
                        }
                    } catch (err) {
                        alert("❌ ไม่สามารถเชื่อมต่อระบบอินเทอร์เน็ตได้ กรุณาตรวจสอบสัญญาณแล้วลองใหม่อีกครั้ง");
                        resetBtn();
                    }
                }
            };

        };
    </script>
</body>
</html>
