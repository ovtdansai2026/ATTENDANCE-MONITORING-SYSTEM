<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนกิจกรรม</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Prompt', sans-serif; background: #0f172a; }</style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen text-slate-800">

    <div class="w-full max-w-md bg-white p-6 rounded-3xl shadow-xl mt-4">
        <div class="text-center mb-6">
            <h1 id="activityTitle" class="text-xl font-bold text-blue-600">กำลังโหลดข้อมูล...</h1>
            <p id="deadlineText" class="text-xs text-slate-500 mt-2"></p>
        </div>

        <form id="attendanceForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold mb-1">ชื่อ-นามสกุล</label>
                <input type="text" id="studentName" required class="w-full border border-slate-300 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-semibold mb-1">ระดับชั้น</label>
                    <select id="stuLevel" required class="w-full border border-slate-300 rounded-lg p-3 text-sm">
                        <option value="">เลือก...</option>
                        <option value="ปวช.1">ปวช.1</option><option value="ปวช.2">ปวช.2</option><option value="ปวช.3">ปวช.3</option>
                        <option value="ปวส.1">ปวส.1</option><option value="ปวส.2">ปวส.2</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">แผนก</label>
                    <select id="stuDept" required class="w-full border border-slate-300 rounded-lg p-3 text-sm">
                        <option value="">เลือก...</option>
                        <option value="ช่างยนต์">ช่างยนต์</option><option value="ช่างกลโรงงาน">ช่างกลโรงงาน</option>
                        <option value="ไฟฟ้ากำลัง">ไฟฟ้ากำลัง</option><option value="คอมพิวเตอร์ธุรกิจ">คอมพิวเตอร์ธุรกิจ</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">ถ่ายรูปหน้าตนเองในงาน</label>
                <input type="file" id="imageInput" accept="image/*" capture="user" required class="w-full text-sm">
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700">ส่งข้อมูล</button>
        </form>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx1i7PNiII3X0aMCOtUoC_4Qg3OrD33J_Hdb2d6VkagGfM1Vxx26pxycla6PKnirxgH/exec";
        const params = new URLSearchParams(window.location.search);
        const activity = params.get('activity');
        const deadline = params.get('deadline');

        document.getElementById('activityTitle').innerText = activity || "ไม่พบชื่อกิจกรรม";
        if (deadline && deadline !== "none") {
            document.getElementById('deadlineText').innerText = "ปิดรับ: " + new Date(deadline).toLocaleString('th-TH');
        }

        document.getElementById('attendanceForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "กำลังส่ง...";

            const file = document.getElementById('imageInput').files[0];
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const payload = {
                    studentName: document.getElementById('studentName').value,
                    pureLevel: document.getElementById('stuLevel').value,
                    pureDept: document.getElementById('stuDept').value,
                    activityName: activity,
                    deadline: deadline,
                    imageCode: reader.result
                };
                
                const res = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                alert(result.status === "success" ? "บันทึกข้อมูลเรียบร้อย!" : "เกิดข้อผิดพลาด: " + result.message);
                btn.disabled = false; btn.innerText = "ส่งข้อมูล";
            };
        };
    </script>
</body>
</html>
